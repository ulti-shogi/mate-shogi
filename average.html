<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四段昇段平均年齢 - 将棋の殿堂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1><a href="index.html" style="text-decoration: none; color: inherit;">将棋の殿堂</a></h1>

    <div class="average-card">
        <h2 class="average-title">将棋棋士の四段昇段平均年齢</h2>
        <div class="average-value" id="averageDisplay">-歳-ヶ月-日</div>
        <p class="average-desc" id="averageDesc">データを読み込んでいます...</p>
    </div>

    <div class="controls average-controls">
        <label style="font-weight: bold; color: #1a3622;">集計対象（時代）の切り替え：
            <select id="periodSelect" class="dynamic-select" style="max-width: 100%; margin-top: 5px;">
                <option value="184-999">現行制度（184番以降）</option>
                <option value="115-183">人数制限無し時代（115〜183番）</option>
                <option value="73-114">予備クラス時代（73〜114番）</option>
                <option value="115-999">旧制度後期＋現行（115番以降）</option>
                <option value="73-183">旧制度すべて（73〜183番）</option>
                <option value="73-999">全期間総合（73番以降すべて）</option>
            </select>
        </label>
    </div>

    <table id="averageTable">
        <thead>
            <tr>
                <th>順位</th>
                <th>棋士名</th>
                <th class="sortable" data-col="four">四段昇段日<span class="sort-icon"></span></th>
                <th class="sortable" data-col="ageValue">四段昇段年齢<span class="sort-icon"></span></th>
                <th class="sortable" data-col="number">棋士番号<span class="sort-icon"></span></th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="5" class="empty-message">読み込み中...</td></tr>
        </tbody>
    </table>
</div>

<script src="average.js"></script>
</body>
</html>

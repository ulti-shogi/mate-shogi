<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋士編入試験の歴史 - 将棋の殿堂</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1><a href="index.html" style="text-decoration: none; color: inherit;">将棋の殿堂</a></h1>

    <div class="average-card">
        <h2 class="average-title" style="margin-bottom:0;">棋士編入試験</h2>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-target="panel-summary">編入試験 結果一覧</button>
        <button class="tab-btn" data-target="panel-history">受験者別 対局詳細</button>
    </div>

    <div id="panel-summary" class="panel active">
        <table id="examSummaryTable">
            <thead>
                <tr>
                    <th class="sortable asc" data-col="id">ID<div class="sort-icon"></div></th>
                    <th>受験者</th>
                    <th class="tablet-col">属性</th>
                    <th>実施年</th>
                    <th>合否</th>
                    <th>勝敗</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" class="empty-message">データ読み込み中...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="panel-history" class="panel">
        <div class="controls" style="justify-content: center;">
            <label style="font-weight: bold; color: #1a3622; display: flex; align-items: center;">受験者：
                <select id="playerSelect" class="dynamic-select" style="max-width: 200px; margin: 0; display: inline-block;"></select>
            </label>
        </div>
        
        <div id="playerStatsCard" style="background-color: #f0ebd8; padding: 15px; margin: 15px 0; border-radius: 6px; text-align: center; color: #1a3622; display: none;">
            </div>

        <table id="historyTable">
            <thead>
                <tr>
                    <th>局</th>
                    <th>対局日</th>
                    <th>試験官</th>
                    <th>勝敗</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="4" class="empty-message">受験者を選択してください</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script src="exam.js"></script>
</body>
</html>

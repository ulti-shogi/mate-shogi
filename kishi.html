        <button class="tab-btn active" data-filter="all">全表示</button>
        <button class="tab-btn" data-filter="active">現役</button>
        <button class="tab-btn" data-filter="retired">引退</button>
        <button class="tab-btn" data-filter="deceased">物故</button>
        <button class="tab-btn" data-filter="withdrawn">退会</button>
    </div>

    <div class="controls" style="margin-top: 20px;">
